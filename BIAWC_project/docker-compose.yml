version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    networks:
      - app-network

  task-service:
    build: ./task-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    networks:
      - app-network

  recommendation-service:
    build: ./recommendation-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    networks:
      - app-network

networks:
  app-network:
    driver: bridge